name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Verify the core crate still builds on the declared MSRV (rust-version in
  # Cargo.toml). The default `matrix` backend (sprs/ndarray) and the dev-deps
  # require a newer rustc, so the MSRV covers `--no-default-features`: drop the
  # dev-deps and let a recent cargo pick MSRV-compatible dependency versions for
  # the old toolchain to build with `--locked`.
  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    env:
      CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: fallback
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.56.0
      - uses: dtolnay/rust-toolchain@stable
      - name: Check core crate on MSRV (1.56)
        run: |
          sed -i '/^\[dev-dependencies\]/,$d' Cargo.toml
          cargo +stable generate-lockfile
          cargo +1.56.0 check --no-default-features --locked

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  # UI/`.stderr` snapshot tests compare rustc's diagnostic output verbatim, and
  # that output is not stable across compiler versions — so they run on a PINNED
  # toolchain, separate from the floating-`stable` `test` job above (where they
  # are excluded via `test = false`). They are run and enforced here, not
  # skipped. To bump the pin: install the new toolchain locally, re-bless with
  # `BLESS=1 cargo +<ver> test --test ui`, and update the version in both places.
  ui:
    name: UI tests (pinned rustc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - run: cargo test --test ui

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  rustdoc:
    name: Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build docs (warnings are errors)
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Doc tests (warnings are errors)
        run: cargo test --doc
        env:
          RUSTDOCFLAGS: -D warnings
